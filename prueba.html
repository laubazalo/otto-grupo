<!DOCTYPE html>
<html lang="en">
<head>
<title>CSS Website Layout</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    .header { /* Estilo del header */
    background-color: lightslategray;
    padding: 20px;
    text-align: center;
    }
    h1 {
        color: #f2f2f2;
        text-align: center;
    }
    

    body { /* Estilo del fondo */
      background-color: lightblue;
    }

    p {
        color: #f2f2f2;
        font-family: 'Times New Roman';
        font-size: 17px;
    }

    *{ /*Barra de navegación*/
        box-sizing: border-box;
    }   

    .barra { /*Estilo de la barra de navegación*/
        overflow: hidden;
        background-color: #333;
        padding: 16px 16px;
    }

    .barra a { 
        display: block;
        color: #f2f2f2;
        font-family: 'Times New Roman';
        text-align: center;
        padding: 16px 16px;
        text-decoration: none;
    }

    body {
        margin: 0;
    }

    .button { /*Estilo del botón para conexión Bluetooth*/
        background-color: #333; 
        border: 2px solid #f2f2f2;
        color: #f2f2f2;
        padding: 14px 14px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        border-radius: 4px;
    }

    #contenedor {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        padding: 10px;
    }

    #colPrincipal { /*Columna principal*/
        width: 70%;
    }

    #colSecundaria { /*Columna secundaria*/
        width: 30%;
    }

    *{
        box-sizing: border-box;
    }

    .pieDePag { /*Pie de página*/
        background-color: #333;
        padding: 10px;
        text-align: center;
        font-family: 'Times New Roman';
    }

    img { /*Para la foto del robot*/
        display: block;
        margin-left: auto;
        margin-right: auto;
        object-fit: cover;
    }

</style>
</head>
<body>

<div class="header">
  <h1>Robot Otto</h1>
</div>

<div class="barra">
    <button class="button" onclick="run()">Conexión Bluetooth</button>
</div>

<div id="contenedor">
    <div id="colSecundaria">
        <h1>Él es Otto</h1>
        <!--<p>Estamos probando</p>-->
        <img src="otto (1).png" alt="Otto" style="width:70%">
    </div>
    <div id="colPrincipal">
        <h1>¿Querés manejarlo?</h1>
        <!--<p>Estamos probando</p>-->
    </div>
</div>

    <div class="pieDePag">
        <p>Bazalo, Lautaro - Correa, Agostina - Depascual, Bianca</p>
    </div>

<script src="prueba.js"></script>
	<meta charset="utf-8">
</head>
    
</body>


</html>
